<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b68ee"/>
      <stop offset="100%" stop-color="#5a4fd4"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eeeaff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Miya shakli + F harfi -->
  <g transform="translate(256, 256)">
    <!-- Miya kontur -->
    <path d="M -110 -40
             Q -130 -90 -80 -110
             Q -50 -130 -10 -120
             Q 30 -130 70 -110
             Q 120 -90 100 -40
             Q 130 -20 115 20
             Q 130 70 80 90
             Q 40 110 0 100
             Q -40 110 -80 90
             Q -130 70 -115 20
             Q -130 -20 -110 -40 Z"
          fill="none" stroke="url(#fg)" stroke-width="6" opacity="0.45"/>
    <!-- Ichki chiziqlar — neyronlar -->
    <path d="M -60 -30 Q 0 -50 60 -20" fill="none" stroke="url(#fg)" stroke-width="4" opacity="0.5"/>
    <path d="M -70 20 Q 0 40 70 10" fill="none" stroke="url(#fg)" stroke-width="4" opacity="0.4"/>
    <!-- Harf F -->
    <text x="0" y="22" font-family="Arial, sans-serif" font-weight="900" font-size="150"
          text-anchor="middle" fill="url(#fg)">F</text>
  </g>
  <!-- Glow chiziq ostida -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#fg)" stroke-width="2" opacity="0.15"/>
</svg>
